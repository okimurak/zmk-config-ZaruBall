CONFIG_SPI=y
CONFIG_ZMK_POINTING=y

CONFIG_PMW3610=y
CONFIG_PMW3610_INVERT_X=y
CONFIG_PMW3610_INVERT_Y=n
CONFIG_PMW3610_ORIENTATION_90=y
CONFIG_INPUT=y
CONFIG_PMW3610_AUTOMOUSE_TIMEOUT_MS=1000
CONFIG_PMW3610_SCROLL_TICK=16
CONFIG_PMW3610_INVERT_SCROLL_X=y
CONFIG_PMW3610_INVERT_SCROLL_Y=n
CONFIG_PMW3610_SMART_ALGORITHM=y
CONFIG_PMW3610_CPI=800
# https://github.com/inorichi/zmk-pmw3610-driver/blob/main/src/pmw3610.h#L106
CONFIG_PMW3610_POLLING_RATE_250=y

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_NFCT_PINS_AS_GPIOS=y

CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

CONFIG_RGBLED_WIDGET=y
CONFIG_RGBLED_WIDGET_INTERVAL_MS=500    

CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=60
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_LOW=30
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10

# https://github.com/caksoylar/zmk-rgbled-widget?tab=readme-ov-file#configuration-details
CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=y
# Base Layer
CONFIG_RGBLED_WIDGET_LAYER_0_COLOR=6
CONFIG_RGBLED_WIDGET_LAYER_1_COLOR=7
CONFIG_RGBLED_WIDGET_LAYER_2_COLOR=5
# Mouse Layer
CONFIG_RGBLED_WIDGET_LAYER_3_COLOR=1
# Lower Layer
CONFIG_RGBLED_WIDGET_LAYER_4_COLOR=3
# Raise Layer
CONFIG_RGBLED_WIDGET_LAYER_7_COLOR=2
# Adjust Layer
CONFIG_RGBLED_WIDGET_LAYER_8_COLOR=0
